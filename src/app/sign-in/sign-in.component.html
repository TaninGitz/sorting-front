<div class="login-container">
  @if (token == undefined) {
  <div class="login-card">
    <div class="card-header">
      <h4 class="text-center mb-0">
        <i class="fas fa-shield-alt me-2"></i>Sign In
      </h4>
    </div>

    <div class="card-body">
      <!-- RFID Login Section -->
      <div class="login-section">
        <div class="section-title">
          <span class="line"></span>
          <span>RFID Login</span>
          <span class="line"></span>
        </div>

        <div class="input-group">
          <span class="input-group-text">
            <i class="fas fa-id-card"></i>
          </span>
          <input
            #rfidInput
            type="password"
            class="form-control"
            placeholder="Scan your RFID card"
            autocomplete="off"
            [disabled]="isLoading"
            (input)="onRFIDInput($event)"
          />
        </div>
        @if (isLoading) {
        <div class="text-center mt-2">
          <small class="text-muted">
            <i class="fas fa-spinner fa-spin me-1"></i>กำลังตรวจสอบ...
          </small>
        </div>
        }
      </div>

      <div class="divider">
        <span class="divider-text">OR</span>
      </div>

      <!-- Employee Login Section -->
      <div class="login-section">
        <div class="section-title">
          <span class="line"></span>
          <span>Employee Login</span>
          <span class="line"></span>
        </div>

        <div class="input-group mb-2">
          <span class="input-group-text">
            <i class="fas fa-user"></i>
          </span>
          <input
            type="text"
            class="form-control"
            placeholder="Employee No."
            [(ngModel)]="empNo"
            [disabled]="isLoading"
          />
        </div>

        <div class="input-group mb-3">
          <span class="input-group-text">
            <i class="fas fa-lock"></i>
          </span>
          <input
            type="password"
            class="form-control"
            placeholder="Password"
            [(ngModel)]="password"
            [disabled]="isLoading"
            (keyup.enter)="signIn()"
          />
        </div>

        <button
          class="btn btn-primary w-100"
          (click)="signIn()"
          [disabled]="isLoading"
        >
          @if (isLoading) {
          <i class="fas fa-spinner fa-spin me-2"></i>
          Processing... } @else {
          <i class="fas fa-sign-in-alt me-2"></i>
          Sign In }
        </button>
        <button class="btn btn-warning w-100 mt-3" (click)="clearInputs()">
          @if (isLoading) {
          <i class="fas fa-spinner fa-spin me-2"></i>
          Processing... } @else {
          <i class="fas fa-times me-2"></i>
          Clear }
        </button>
      </div>
    </div>
  </div>
  } @else {
  <div class="welcome-screen">
    <div class="welcome-header">
      <i class="fas fa-check-circle welcome-icon mb-3"></i>
      <h4 class="mb-4">Welcome to PRESS-LPB</h4>
    </div>

    <!-- @if(empNo == 'LC115'){} -->
    <!-- Inventory Management Section -->
    <div class="section-container mt-4">
      <h5 class="section-title">Sorting Record Management</h5>
      <div class="menu-grid">
        <!-- Input Sorting -->
        <a class="menu-item" [routerLink]="['/input-sorting']">
          <div class="menu-icon ">
            <i class="fas fa-boxes"></i>
          </div>
          <span class="menu-label">Input Sorting</span>
        </a>

        <!-- Close WOS -->
        <a class="menu-item" [routerLink]="['/sorting-report']">
          <div class="menu-icon">
            <i class="fas fa-clipboard-check"></i>
          </div>
          <span class="menu-label">Sorting Record</span>
        </a>


        <!-- Production Output Report -->
        <a class="menu-item" [routerLink]="['/dashboard']">
          <div class="menu-icon ">
            <i class="fas fa-chart-bar"></i>
          </div>
          <span class="menu-label">Sorting Dashboard</span>
        </a>

        <a class="menu-item" [routerLink]="['/employee-report']">
          <div class="menu-icon ">
            <i class="fas fa-address-book"></i>
          </div>
          <span class="menu-label">Employee Dashboard</span>
        </a>
      </div>
    </div>


  </div>
  }
</div>
